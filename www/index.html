<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gestión de Viajes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splashScreen" class="screen active"
     style="display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:16px;">
  <img src="logo.png" width="120" alt="COT Logo">
  <div class="splash-text">Cargando aplicación…</div>
</div>

<!-- ================= REGISTRO ================= -->
<div id="registroScreen" class="screen">
  <div class="screen-container">
    <h2>Registro del Chofer</h2>

    <label>Legajo</label>
    <input id="regLegajo">

    <label>Nombre</label>
    <input id="regNombre">

    <label>Base / Punta de inicio</label>
    <select id="regBase">
      <option value="Montevideo">Montevideo</option>
      <option value="Colonia">Colonia</option>
      <option value="Maldonado">Maldonado</option>
      <option value="Punta del Este">Punta del Este</option>
      <option value="Rocha">Rocha</option>
      <option value="Chuy">Chuy</option>
      <option value="Otro">Otro</option>
    </select>

    <label>Tipo de chofer</label>
    <select id="regTipo">
      <option value="">Elegí tipo...</option>
      <option value="efectivo">Efectivo</option>
      <option value="contratado">Contratado</option>
    </select>

    <button onclick="registrarChofer()">Guardar y continuar</button>
  </div>
</div>

<!-- ================= MAIN SCREEN ================= -->
<div id="mainScreen" class="screen">

  <div class="header-bar">
    <h1>Gestión de Viajes</h1>
    <p>Sistema de control de flota</p>
    <p id="baseChoferBadge">Base: —</p>
  </div>

  <div class="screen-container">

    <h3>Estado de la jornada</h3>

    <div style="
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      padding:8px;
      background:#eef2ff;
      border-radius:8px;
      font-size:14px;
    ">
      <div id="ordenActivaInfo"></div>
      <div id="bloqueCerrarJornada"></div>
    </div>

    <div id="viajeEnCursoContainer"></div>

    <h3>Operaciones del día</h3>

    <div class="menu-tarjetas">
      <button class="card-btn" onclick="abrirViajeSimple()">🚗 Nuevo Viaje</button>
      <button class="card-btn" onclick="showScreen('listaViajesScreen')">📄 Ver Viajes</button>
      <button class="card-btn" onclick="showScreen('nuevaGuardiaScreen')">➕ Registrar Guardia</button>
      <button class="card-btn" onclick="showScreen('listaGuardiasScreen')">🕒 Ver Guardias</button>
      <button class="card-btn" onclick="abrirHistorial()">📊 Historial</button>
    </div>

  </div>
</div>

<!-- ================= NUEVO VIAJE ================= -->
<div id="travelScreen" class="screen">

  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('mainScreen')">←</button>
    <div>
      <h3 style="margin:0;">Nuevo Viaje</h3>
      <small id="orderNumberTravels"></small>
    </div>
  </div>

  <div class="screen-container">
    <div class="card">

      <label>Origen</label>
      <select id="originTravels"></select>

      <label>Destino</label>
      <input id="destinationTravels" oninput="autoKmPorDestino()">

      <div id="sugerenciasRutas"
           style="display:none; border:1px solid #ddd; border-radius:8px;
                  max-height:160px; overflow:auto; margin-bottom:10px;">
      </div>

      <label>Código cartel</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <select id="tipoCoche" onchange="actualizarCodigoCartel()" style="flex:2;">
          <option value="">Elegí coche...</option>
          <option value="marcopolo">Marcopolo</option>
          <option value="neobus">Neobus</option>
        </select>
        <div id="codigoCartel" style="flex:1; text-align:center; font-weight:bold;
             font-size:1.1em; background:#f0f4ff; border-radius:6px; padding:6px 4px;">
        </div>
      </div>

      <label>Número de coche</label>
      <input type="number" id="numeroCoche" placeholder="Ej: 1234" min="1">

      <div id="horariosOficiales"
           style="display:none; border:1px solid #ddd; border-radius:8px;
                  padding:8px; margin-bottom:10px;">
      </div>

      <label>Servicio</label>
      <select id="numeroServicio" onchange="actualizarInfoServicio(); actualizarCodigoCartel()">
        <option value="">Elegí servicio...</option>
        <option value="TURNO">Turno</option>
        <option value="SEMI">Semi-directo</option>
        <option value="DIRECTO">Directo</option>
        <option value="EXPRESO">Expreso</option>
        <option value="CONTRATADO">Contratado</option>
        <option value="PASAJERO">Pasajero</option>
      </select>

      <label>Kilómetros (auto)</label>
      <input id="kmTravels" type="number">

      <label>Hora salida</label>
      <input id="departureTimeTravels" type="time">

      <label>Hora llegada</label>
      <input id="arrivalTimeTravels" type="time">

      <label>
        <input type="checkbox" id="idaYVueltaAuto">
        Generar vuelta automática
      </label>

      <button onclick="addTravelUI(event)">Guardar Viaje</button>
    </div>
  </div>
</div>

<!-- ================= LISTA VIAJES ================= -->
<div id="listaViajesScreen" class="screen">
  <div class="header-fijo">
    <button onclick="showScreen('mainScreen')">← Volver</button>
    <h2>Lista de Viajes</h2>
    <div id="resumenDia"></div>
  </div>
  <div class="contenido-scroll">
    <div id="cardsViajesContainer"></div>
  </div>
</div>

<!-- ================= DETALLE ORDEN ================= -->
<div id="detalleOrdenScreen" class="screen">
  <div class="header-fijo">
    <button onclick="showScreen('listaViajesScreen')">← Volver</button>
    <h2>Detalle de Jornada</h2>
  </div>
  <div class="contenido-scroll">
    <div id="detalleOrdenContainer"></div>
  </div>
</div>

<!-- ================= HISTORIAL ================= -->
<div id="historialScreen" class="screen">
  <div class="screen-header">
    <button onclick="showScreen('mainScreen')">← Volver</button>
    <h2>Historial</h2>
  </div>

  <div style="padding:12px">
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <select id="filtroMes" onchange="renderHistorial()"
        style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
      </select>
      <select id="filtroDia" onchange="renderHistorial()"
        style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
        <option value="">Todos los días</option>
      </select>
    </div>
    <div id="historialContainer"></div>
  </div>

  <div style="text-align:center; padding:20px 0 40px 0;">
    <button id="btnLimpiarStorage" style="
      background:none; border:1px solid #ccc;
      border-radius:8px; padding:8px 16px;
      font-size:12px; color:#999; cursor:pointer;">
      🗑 Limpiar datos de prueba
    </button>
  </div>
</div>

<!-- ================= GUARDIAS ================= -->
<div id="nuevaGuardiaScreen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('mainScreen')">←</button>
    <h3 style="margin:0;">Registrar Guardia</h3>
  </div>

  <form onsubmit="addGuardUI(event); return false;">
    <label>Día</label>
    <input id="diaGuardia" type="date">

    <label>Hora inicio</label>
    <input id="horaInicioGuardia" type="time">

    <div style="display:none;">
      <label>Hora fin</label>
      <input id="horaFinGuardia" type="time">
    </div>

    <label>Tipo</label>
    <select id="tipoGuardia" onchange="manejarDescripcionGuardia()">
      <option value="">Elegí tipo...</option>
      <option value="comun">Guardia común</option>
      <option value="especial">Guardia especial</option>
    </select>

    <div id="boxDescripcionGuardia" style="display:none;">
      <label>Descripción</label>
      <input id="descripcionGuardia">
    </div>

    <button type="submit">Guardar Guardia</button>
  </form>
</div>

<div id="listaGuardiasScreen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('mainScreen')">←</button>
    <h3 style="margin:0;">Guardias por día</h3>
  </div>
  <div id="cardsGuardiasContainer"></div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="./core/core.js"></script>
<script src="sync.js"></script>
<script src="./core_bridge.js"></script>
<script src="./schedules_cot.js"></script>
<script src="./routes_catalog.js"></script>
<script src="./routes_signs.js"></script>
<script src="./routes_utils.js"></script>
<script src="./ui_navigation.js"></script>
<script src="./ui_registro.js"></script>
<script src="./ui_summary.js"></script>
<script src="./ui_travels.js"></script>
<script src="./travel_stats.js"></script>
<script src="./ui_guards.js"></script>
<script src="./app_bootstrap.js"></script>

</body>
</html>
